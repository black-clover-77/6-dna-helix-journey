<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>DNA Helix Journey | VishwaNova 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      canvas {
        max-width: 100vw !important;
        max-height: 80vh !important;
        object-fit: contain;
      }
      body {
        overflow-x: hidden;
        touch-action: manipulation;
      }
      canvas {
        max-width: 100%;
        height: auto;
      }
    </style>

</head>
  <body>
    <div id="loader">
      <div class="loader-content">
        <div class="loader-helix"></div>
        <p class="loader-text">Sequencing DNA...</p>
      </div>
    </div>
    <audio id="bg-audio" loop>
      <source
        src="https://cdn.pixabay.com/audio/2022/03/10/audio_1808fbf07a.mp3?v=6"
        type="audio/mpeg"
      />
    </audio>
    <button id="audio-toggle" aria-label="Toggle audio">🎵</button>
    <main id="app">
      <canvas id="dna-canvas"></canvas>
      <div id="info-panel">
        <div id="base-count">
          <span>Base Pairs: </span><span id="bp-count">0</span>
        </div>
        <div id="current-fact"></div>
      </div>
      <div id="controls">
        <button id="mutate-btn">🧬 Mutate</button>
        <button id="mode-toggle">DNA → RNA</button>
      </div>
      <h1 id="title">THE HELIX OF LIFE</h1>
      <p id="subtitle">Scroll to journey through your DNA</p>
    </main>
    <footer class="github-badge">
      <a href="https://github.com/AkshatRock/weboreel-hackathon" target="_blank"
        >⭐ GitHub Repo</a
      ><span>VishwaNova 2026</span>
    </footer>
    <script src="script.js"></script>
</body>
</html>
